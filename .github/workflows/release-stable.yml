name: Stable Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-pages
  cancel-in-progress: false

jobs:
  build:
    name: Stable Release (${{ matrix.target }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            target: macos-arm64
            args: --target aarch64-apple-darwin
          - platform: macos-26-intel
            target: macos-x64
            args: --target x86_64-apple-darwin
          - platform: windows-2025-vs2026
            target: windows-x64
            args: ""
          - platform: ubuntu-24.04
            target: linux-x64
            args: ""
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v6
        continue-on-error: true
      - name: Checkout repository (retry)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@v6
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos-26') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify updater signing configuration
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MOCHI_UPDATER_PUBLIC_KEY: ${{ secrets.MOCHI_UPDATER_PUBLIC_KEY }}
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "stable releases require vMAJOR.MINOR.PATCH tags"; exit 1; }
          test -n "${TAURI_SIGNING_PRIVATE_KEY}" || { echo "missing TAURI_SIGNING_PRIVATE_KEY"; exit 1; }
          test -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" || { echo "missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD"; exit 1; }
          test -n "${MOCHI_UPDATER_PUBLIC_KEY}" || { echo "missing MOCHI_UPDATER_PUBLIC_KEY"; exit 1; }
          node -e '
            const fs = require("fs");
            const path = "src-tauri/tauri.conf.json";
            const pubkey = process.env.MOCHI_UPDATER_PUBLIC_KEY;
            const text = fs.readFileSync(path, "utf8").replace("MOCHI_UPDATER_PUBLIC_KEY_REPLACED_BY_CI", pubkey);
            if (text.includes("MOCHI_UPDATER_PUBLIC_KEY_REPLACED_BY_CI")) process.exit(1);
            fs.writeFileSync(path, text);
          '
      - name: Build and publish stable Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOCHI_UPDATE_CHANNEL: stable
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS ad-hoc signing (same as unstable) until valid APPLE_* secrets are configured.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Mochi ${{ github.ref_name }}
          # Re-runs of this workflow should skip the build job and only run the
          # Pages updater-feed job; the build and release assets are immutable
          # once published.
          releaseBody: |
            ## Mochi ${{ github.ref_name }}

            Stable release with more reliable refreshes, widget tab persistence, tray navigation fixes, and permanent Linux on-demand windows.

            ### What's changed
            - **Reliable provider refreshes** — Rust-orchestrated tray refresh, serialized status updates, expanded cold-start triggers, and invalid timestamp handling keep usage data current.
            - **Widget tab persistence** — selected tab persists through shared settings with secure initialization on startup.
            - **Tray navigation** — chevron tab navigation works again in the tray panel.
            - **Linux on-demand windows** — on-demand visible window policy is now the permanent Linux default for cleaner widget and settings behavior.

            ### Install stable
            - macOS: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-macos.sh | bash`
            - Linux: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-linux.sh | bash`
            - Windows: `irm https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-windows.ps1 | iex`

            Unstable: add `-i` / `-Unstable`. See [README#install](https://github.com/BrainerVirus/mochi#install) and [docs/linux.md](https://github.com/BrainerVirus/mochi/blob/main/docs/linux.md).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
      - name: Upload stable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mochi-stable-${{ matrix.target }}
          path: src-tauri/target/**/release/bundle/**
      - name: Upload updater bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: updater-bundle-${{ matrix.platform }}-${{ matrix.target }}
          path: src-tauri/target/**/release/bundle/**
          if-no-files-found: error

  updater-feed:
    name: Publish Stable Updater Feed
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: https://brainervirus.github.io/mochi/
    env:
      GITHUB_SHA: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Download updater bundle artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: updater-bundle-*
          path: updater-bundles
          merge-multiple: true
      - name: Build updater artifact manifest
        shell: bash
        env:
          CHANNEL: stable
          CHANNELS: stable,unstable
          UPDATER_FEED_BASE_URL: https://mochi-app.github.io/mochi/updates
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_BASE_URL: https://github.com/BrainerVirus/mochi/releases/download/${{ github.ref_name }}
        run: |
          cat > release-notes.md <<'EOF'
          ### What's changed
          - See the GitHub release notes for this version.
          EOF
          node scripts/release/collect-updater-artifacts.mjs \
            --artifactRoot=updater-bundles \
            --channel="${CHANNEL}" \
            --tagName="${TAG_NAME}" \
            --releaseBaseUrl="${RELEASE_BASE_URL}" \
            --releaseNotesPath=release-notes.md \
            --outputPath=updater-feed.json \
            --pubDate="$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          node -e '
            const fs = require("fs");
            const manifest = JSON.parse(fs.readFileSync("updater-feed.json", "utf8"));
            manifest.channels = process.env.CHANNELS.split(",").map((value) => value.trim()).filter(Boolean);
            fs.writeFileSync("updater-feed.json", `${JSON.stringify(manifest, null, 2)}\n`);
          '
      - name: Build updater feeds
        run: node scripts/release/build-updater-feed.mjs --manifest=updater-feed.json --out=public
      - name: Validate updater feeds
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/release/validate-updater-feed.mjs \
            public/updates/darwin/aarch64/0.1.7/stable.json \
            public/updates/darwin/aarch64/0.2.0/stable.json \
            "public/updates/darwin/aarch64/${VERSION}/stable.json" \
            public/updates/darwin/x86_64/0.1.7/stable.json \
            public/updates/darwin/x86_64/0.2.0/stable.json \
            "public/updates/darwin/x86_64/${VERSION}/stable.json" \
            public/updates/linux/x86_64/0.1.7/stable.json \
            public/updates/linux/x86_64/0.2.0/stable.json \
            "public/updates/linux/x86_64/${VERSION}/stable.json" \
            public/updates/windows/x86_64/0.1.7/stable.json \
            public/updates/windows/x86_64/0.2.0/stable.json \
            "public/updates/windows/x86_64/${VERSION}/stable.json"
      - name: Upload updater Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - name: Deploy updater feed to GitHub Pages
        uses: actions/deploy-pages@v5
        id: pages-deploy
      - name: Validate published updater endpoints
        shell: bash
        run: |
          sleep 30
          VERSION="${GITHUB_REF_NAME#v}"
          for path in \
            updates/darwin/aarch64/0.1.7/stable.json \
            updates/darwin/aarch64/0.2.0/stable.json \
            updates/darwin/aarch64/${VERSION}/stable.json \
            updates/darwin/x86_64/0.1.7/stable.json \
            updates/darwin/x86_64/0.2.0/stable.json \
            updates/darwin/x86_64/${VERSION}/stable.json \
            updates/linux/x86_64/0.1.7/stable.json \
            updates/linux/x86_64/0.2.0/stable.json \
            updates/linux/x86_64/${VERSION}/stable.json \
            updates/windows/x86_64/0.1.7/stable.json \
            updates/windows/x86_64/0.2.0/stable.json \
            updates/windows/x86_64/${VERSION}/stable.json
          do
            url="https://brainervirus.github.io/mochi/${path}"
            curl --fail --silent --show-error --location "${url}" --output feed.json
            node scripts/release/validate-updater-feed.mjs feed.json
          done

  release-notes:
    name: Publish Stable Release Notes
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Update stable release body
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = context.ref.replace("refs/tags/", "");
            const body = [
              `## Mochi ${tag}`,
              "",
              "Stable release with more reliable refreshes, widget tab persistence, tray navigation fixes, and permanent Linux on-demand windows.",
              "",
              "### What's changed",
              "- **Reliable provider refreshes** — Rust-orchestrated tray refresh, serialized status updates, expanded cold-start triggers, and invalid timestamp handling keep usage data current.",
              "- **Widget tab persistence** — selected tab persists through shared settings with secure initialization on startup.",
              "- **Tray navigation** — chevron tab navigation works again in the tray panel.",
              "- **Linux on-demand windows** — on-demand visible window policy is now the permanent Linux default for cleaner widget and settings behavior.",
              "",
              "### Install stable",
              "- macOS: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-macos.sh | bash`",
              "- Linux: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-linux.sh | bash`",
              "- Windows: `irm https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-windows.ps1 | iex`",
              "",
              "Unstable: add `-i` / `-Unstable`. See [README#install](https://github.com/BrainerVirus/mochi#install) and [docs/linux.md](https://github.com/BrainerVirus/mochi/blob/main/docs/linux.md).",
            ].join("\n");
            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.data.id,
              body,
            });
