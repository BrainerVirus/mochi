name: Stable Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: stable-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Stable Release (${{ matrix.target }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            target: macos-arm64
            args: --target aarch64-apple-darwin
          - platform: macos-26-intel
            target: macos-x64
            args: --target x86_64-apple-darwin
          - platform: windows-2025-vs2026
            target: windows-x64
            args: ""
          - platform: ubuntu-24.04
            target: linux-x64
            args: ""
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v6
        continue-on-error: true
      - name: Checkout repository (retry)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@v6
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf flatpak flatpak-builder
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos-26') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and publish stable Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOCHI_UPDATE_CHANNEL: stable
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Mochi ${{ github.ref_name }}
          releaseBody: |
            ## Mochi ${{ github.ref_name }}

            First public stable release of Mochi — a cross-platform desktop companion for AI coding tool usage.

            ### Highlights
            - **Menu bar tray** — session and weekly usage, reset windows, and provider status at a glance
            - **12+ providers** — Codex, Claude, Cursor, Gemini, Copilot, Factory, OpenCode, and more
            - **Native Settings** — refresh interval, update channel, provider tokens, and usage notifications
            - **Auto-updater** — check for updates in-app; switch between stable and unstable channels
            - **Install scripts** — macOS (direct + Homebrew), Linux (AppImage/deb/rpm), Windows (MSI/exe)
            - **Cross-platform** — macOS (Apple Silicon + Intel), Windows x64, Linux x64

            ### Install stable
            - macOS: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-macos.sh | bash`
            - Linux: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-linux.sh | bash`
            - Windows: `irm https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-windows.ps1 | iex`

            Unstable builds: add `-i` (shell) or `-Unstable` (PowerShell). See [README#install](https://github.com/BrainerVirus/mochi#install).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
      - name: Upload stable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mochi-stable-${{ matrix.target }}
          path: src-tauri/target/**/release/bundle/**
