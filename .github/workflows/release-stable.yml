name: Stable Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stable-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Stable Release (${{ matrix.target }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            target: macos-arm64
            args: --target aarch64-apple-darwin
          - platform: macos-26-intel
            target: macos-x64
            args: --target x86_64-apple-darwin
          - platform: windows-2025-vs2026
            target: windows-x64
            args: ""
          - platform: ubuntu-24.04
            target: linux-x64
            args: ""
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v6
        continue-on-error: true
      - name: Checkout repository (retry)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@v6
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos-26') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and publish stable Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOCHI_UPDATE_CHANNEL: stable
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS ad-hoc signing (same as unstable) until valid APPLE_* secrets are configured.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Mochi ${{ github.ref_name }}
          releaseBody: |
            ## Mochi ${{ github.ref_name }}

            Stable release: SQLite-backed usage persistence, refresh controller, and cached-usage CLI.

            ### What's changed
            - **SQLite usage persistence** — provider snapshots, transitions, and last-refresh metadata now live in a local SQLite store, so the tray, widget, and settings show last-known data before the first live refresh and survive restarts.
            - **Refresh controller** — scheduled refreshes are gated by enabled providers, refresh-on-startup policy, and successful credential detection, so disabled providers and missing credentials no longer trigger network calls.
            - **Cached-usage CLI** — `mochi usage` reads the same SQLite store on macOS, Linux, and Windows, returning the latest snapshot without spawning a new refresh.
            - **macOS CLI symlink** — the macOS installer now links the bundled CLI to `~/.local/bin/mochi` for direct shell use.

            ### Install stable
            - macOS: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-macos.sh | bash`
            - Linux: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-linux.sh | bash`
            - Windows: `irm https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-windows.ps1 | iex`

            Unstable: add `-i` / `-Unstable`. See [README#install](https://github.com/BrainerVirus/mochi#install) and [docs/linux.md](https://github.com/BrainerVirus/mochi/blob/main/docs/linux.md).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
      - name: Upload stable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mochi-stable-${{ matrix.target }}
          path: src-tauri/target/**/release/bundle/**

  release-notes:
    name: Publish Stable Release Notes
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Update stable release body
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = context.ref.replace("refs/tags/", "");
            const body = [
              `## Mochi ${tag}`,
              "",
              "Stable release: SQLite-backed usage persistence, refresh controller, and cached-usage CLI.",
              "",
              "### What's changed",
              "- **SQLite usage persistence** — provider snapshots, transitions, and last-refresh metadata now live in a local SQLite store, so the tray, widget, and settings show last-known data before the first live refresh and survive restarts.",
              "- **Refresh controller** — scheduled refreshes are gated by enabled providers, refresh-on-startup policy, and successful credential detection, so disabled providers and missing credentials no longer trigger network calls.",
              "- **Cached-usage CLI** — `mochi usage` reads the same SQLite store on macOS, Linux, and Windows, returning the latest snapshot without spawning a new refresh.",
              "- **macOS CLI symlink** — the macOS installer now links the bundled CLI to `~/.local/bin/mochi` for direct shell use.",
              "",
              "### Install stable",
              "- macOS: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-macos.sh | bash`",
              "- Linux: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-linux.sh | bash`",
              "- Windows: `irm https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-windows.ps1 | iex`",
              "",
              "Unstable: add `-i` / `-Unstable`. See [README#install](https://github.com/BrainerVirus/mochi#install) and [docs/linux.md](https://github.com/BrainerVirus/mochi/blob/main/docs/linux.md).",
            ].join("\n");
            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.data.id,
              body,
            });
