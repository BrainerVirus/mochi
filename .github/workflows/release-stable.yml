name: Stable Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stable-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Stable Release (${{ matrix.target }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            target: macos-arm64
            args: --target aarch64-apple-darwin
          - platform: macos-26-intel
            target: macos-x64
            args: --target x86_64-apple-darwin
          - platform: windows-2025-vs2026
            target: windows-x64
            args: ""
          - platform: ubuntu-24.04
            target: linux-x64
            args: ""
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v6
        continue-on-error: true
      - name: Checkout repository (retry)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@v6
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos-26') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and publish stable Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOCHI_UPDATE_CHANNEL: stable
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS ad-hoc signing (same as unstable) until valid APPLE_* secrets are configured.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Mochi ${{ github.ref_name }}
          releaseBody: |
            ## Mochi ${{ github.ref_name }}

            Stable Linux parity repair release.

            ### What's changed
            - **Refresh fixes** — background refresh, tray refresh, and manual refresh now perform real enabled-provider fetches before updating cached usage.
            - **Linux browser detection** — Firefox and Zen profiles are discovered from their Linux profile roots so Cursor, OpenCode, and OpenCode Go can import active sessions.
            - **Updater fixes** — stable and unstable update checks/install actions use explicit channel endpoints, and What's New can fetch the current release notes even when updater checks fail.
            - **Linux windows** — settings/widget windows no longer render the macOS drag region on Linux, keeping native controls and mouse wheel scrolling available immediately.
            - **GNOME tray guidance** — the installer can set up AppIndicator support, the indicator menu starts with Show usage, and Linux docs explain the GNOME fallback behavior.
            - **Widget polish** — widget height sync removes the extra bottom space while preserving the user's current widget width.
            - **Docs** — README hierarchy now puts features and requirements before install, with clearer Homebrew local-cask guidance.

            ### Install stable
            - macOS: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-macos.sh | bash`
            - Linux: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-linux.sh | bash`
            - Windows: `irm https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-windows.ps1 | iex`

            Unstable: add `-i` / `-Unstable`. See [README#install](https://github.com/BrainerVirus/mochi#install) and [docs/linux.md](https://github.com/BrainerVirus/mochi/blob/main/docs/linux.md).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
      - name: Upload stable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mochi-stable-${{ matrix.target }}
          path: src-tauri/target/**/release/bundle/**

  release-notes:
    name: Publish Stable Release Notes
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Update stable release body
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = context.ref.replace("refs/tags/", "");
            const body = [
              `## Mochi ${tag}`,
              "",
              "Stable Linux parity repair release.",
              "",
              "### What's changed",
              "- **Refresh fixes** — background refresh, tray refresh, and manual refresh now perform real enabled-provider fetches before updating cached usage.",
              "- **Linux browser detection** — Firefox and Zen profiles are discovered from their Linux profile roots so Cursor, OpenCode, and OpenCode Go can import active sessions.",
              "- **Updater fixes** — stable and unstable update checks/install actions use explicit channel endpoints, and What's New can fetch the current release notes even when updater checks fail.",
              "- **Linux windows** — settings/widget windows no longer render the macOS drag region on Linux, keeping native controls and mouse wheel scrolling available immediately.",
              "- **GNOME tray guidance** — the installer can set up AppIndicator support, the indicator menu starts with Show usage, and Linux docs explain the GNOME fallback behavior.",
              "- **Widget polish** — widget height sync removes the extra bottom space while preserving the user's current widget width.",
              "- **Docs** — README hierarchy now puts features and requirements before install, with clearer Homebrew local-cask guidance.",
              "",
              "### Install stable",
              "- macOS: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-macos.sh | bash`",
              "- Linux: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-linux.sh | bash`",
              "- Windows: `irm https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-windows.ps1 | iex`",
              "",
              "Unstable: add `-i` / `-Unstable`. See [README#install](https://github.com/BrainerVirus/mochi#install) and [docs/linux.md](https://github.com/BrainerVirus/mochi/blob/main/docs/linux.md).",
            ].join("\n");
            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.data.id,
              body,
            });
