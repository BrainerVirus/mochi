name: Stable Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: stable-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Stable Release (${{ matrix.target }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            target: macos-arm64
            args: --target aarch64-apple-darwin
          - platform: macos-26-intel
            target: macos-x64
            args: --target x86_64-apple-darwin
          - platform: windows-2025-vs2026
            target: windows-x64
            args: ""
          - platform: ubuntu-24.04
            target: linux-x64
            args: ""
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v6
        continue-on-error: true
      - name: Checkout repository (retry)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@v6
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos-26') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify updater signing configuration
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MOCHI_UPDATER_PUBLIC_KEY: ${{ secrets.MOCHI_UPDATER_PUBLIC_KEY }}
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "stable releases require vMAJOR.MINOR.PATCH tags"; exit 1; }
          test -n "${TAURI_SIGNING_PRIVATE_KEY}" || { echo "missing TAURI_SIGNING_PRIVATE_KEY"; exit 1; }
          test -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" || { echo "missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD"; exit 1; }
          test -n "${MOCHI_UPDATER_PUBLIC_KEY}" || { echo "missing MOCHI_UPDATER_PUBLIC_KEY"; exit 1; }
          node -e '
            const fs = require("fs");
            const path = "src-tauri/tauri.conf.json";
            const pubkey = process.env.MOCHI_UPDATER_PUBLIC_KEY;
            const text = fs.readFileSync(path, "utf8").replace("MOCHI_UPDATER_PUBLIC_KEY_REPLACED_BY_CI", pubkey);
            if (text.includes("MOCHI_UPDATER_PUBLIC_KEY_REPLACED_BY_CI")) process.exit(1);
            fs.writeFileSync(path, text);
          '
      - name: Build and publish stable Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOCHI_UPDATE_CHANNEL: stable
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # ponytail: ad-hoc signing — no paid Apple Developer account; installers strip quarantine.
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos-') && '-' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Mochi ${{ github.ref_name }}
          releaseBody: |
            ## Mochi ${{ github.ref_name }}

            Stable release that keeps your selected tray provider through usage refreshes and reports the installed version consistently in CLI diagnostics.

            ### What's changed
            - **Tray selection stays put** — refreshing usage no longer replaces the selected provider icon with Overview.
            - **Consistent version diagnostics** — the CLI now reports the same version as the installed Mochi app.

            ### Install stable
            - macOS: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-macos.sh | bash`
            - Linux: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-linux.sh | bash`
            - Windows: `irm https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-windows.ps1 | iex`

            Unstable: add `-i` / `-Unstable`. See [README#install](https://github.com/BrainerVirus/mochi#install) and [docs/linux.md](https://github.com/BrainerVirus/mochi/blob/main/docs/linux.md).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
      - name: Upload stable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mochi-stable-${{ matrix.target }}
          path: src-tauri/target/**/release/bundle/**
      - name: Upload updater bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: updater-bundle-${{ matrix.platform }}-${{ matrix.target }}
          path: src-tauri/target/**/release/bundle/**
          if-no-files-found: error

  publish-updater-pages:
    name: Publish Stable Updater Feed
    needs: build
    # Always use publish logic from main so feed deploy fixes do not require a new tag.
    uses: BrainerVirus/mochi/.github/workflows/publish-updater-pages.yml@main
    with:
      release_tag: ${{ github.ref_name }}
    permissions:
      pages: write
      id-token: write
      actions: read
      contents: read

  update-homebrew-cask:
    name: Update Stable Homebrew Cask
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Generate stable Homebrew cask
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/release/generate-homebrew-casks.mjs --tag "${{ github.ref_name }}" --cask mochi-desktop --out-dir Casks
      - name: Open Homebrew cask PR and merge after CI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/release/publish-homebrew-cask-pr.sh \
            Casks/mochi-desktop.rb \
            "chore(homebrew): update stable cask for ${{ github.ref_name }}" \
            "chore/homebrew-stable-${{ github.ref_name }}" \
            "chore(homebrew): update stable cask for ${{ github.ref_name }}"

  release-notes:
    name: Publish Stable Release Notes
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Update stable release body
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = context.ref.replace("refs/tags/", "");
            const body = [
              `## Mochi ${tag}`,
              "",
              "Stable release that keeps your selected tray provider through usage refreshes and reports the installed version consistently in CLI diagnostics.",
              "",
              "### What's changed",
              "- **Tray selection stays put** — refreshing usage no longer replaces the selected provider icon with Overview.",
              "- **Consistent version diagnostics** — the CLI now reports the same version as the installed Mochi app.",
              "",
              "### Install stable",
              "- macOS: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-macos.sh | bash`",
              "- Linux: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-linux.sh | bash`",
              "- Windows: `irm https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-windows.ps1 | iex`",
              "",
              "Unstable: add `-i` / `-Unstable`. See [README#install](https://github.com/BrainerVirus/mochi#install) and [docs/linux.md](https://github.com/BrainerVirus/mochi/blob/main/docs/linux.md).",
            ].join("\n");
            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.data.id,
              body,
            });
