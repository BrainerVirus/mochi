name: Unstable Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: unstable-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Prepare Unstable Metadata
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.unstable_metadata.outputs.tag }}
      base_version: ${{ steps.unstable_metadata.outputs.base_version }}
    steps:
      - name: Prepare unstable release metadata
        id: unstable_metadata
        shell: bash
        env:
          MOCHI_UNSTABLE_BASE_VERSION: ${{ vars.MOCHI_UNSTABLE_BASE_VERSION || '0.2.1' }}
        run: |
          [[ "${MOCHI_UNSTABLE_BASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "MOCHI_UNSTABLE_BASE_VERSION must be semver"; exit 1; }
          node -e '
            const [major, minor, patch] = process.env.MOCHI_UNSTABLE_BASE_VERSION.split(".").map(Number);
            const ok = major > 0 || minor > 2 || (minor === 2 && patch > 0);
            if (!ok) {
              console.error("MOCHI_UNSTABLE_BASE_VERSION must be greater than 0.2.0");
              process.exit(1);
            }
          '
          echo "tag=unstable-$(date -u +%Y%m%d.%H%M%S)" >> "${GITHUB_OUTPUT}"
          echo "base_version=${MOCHI_UNSTABLE_BASE_VERSION}" >> "${GITHUB_OUTPUT}"

  build:
    name: Unstable Release (${{ matrix.target }})
    needs: metadata
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            target: macos-arm64
            args: --target aarch64-apple-darwin
          - platform: macos-26-intel
            target: macos-x64
            args: --target x86_64-apple-darwin
          - platform: windows-2025-vs2026
            target: windows-x64
            args: ""
          - platform: ubuntu-24.04
            target: linux-x64
            args: ""
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v6
        continue-on-error: true
      - name: Checkout repository (retry)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@v6
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos-26') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify updater signing configuration
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MOCHI_UPDATER_PUBLIC_KEY: ${{ secrets.MOCHI_UPDATER_PUBLIC_KEY }}
        run: |
          test -n "${TAURI_SIGNING_PRIVATE_KEY}" || { echo "missing TAURI_SIGNING_PRIVATE_KEY"; exit 1; }
          test -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" || { echo "missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD"; exit 1; }
          test -n "${MOCHI_UPDATER_PUBLIC_KEY}" || { echo "missing MOCHI_UPDATER_PUBLIC_KEY"; exit 1; }
          node -e '
            const fs = require("fs");
            const path = "src-tauri/tauri.conf.json";
            const pubkey = process.env.MOCHI_UPDATER_PUBLIC_KEY;
            const text = fs.readFileSync(path, "utf8").replace("MOCHI_UPDATER_PUBLIC_KEY_REPLACED_BY_CI", pubkey);
            if (text.includes("MOCHI_UPDATER_PUBLIC_KEY_REPLACED_BY_CI")) process.exit(1);
            fs.writeFileSync(path, text);
          '
      - name: Build unstable Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOCHI_UPDATE_CHANNEL: unstable
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos-') && '-' || '' }}
        with:
          tagName: ${{ needs.metadata.outputs.tag }}
          releaseName: Mochi Unstable ${{ needs.metadata.outputs.tag }}
          releaseBody: |
            ## Mochi Unstable

            Latest `main` build with instant tray updates when you change providers in Settings, safer re-enable with invalid credentials, and reliable settings sync across all windows.

            ### What's changed
            - **Instant tray updates** — disabling or enabling a provider in Settings updates the tray panel immediately without a manual refresh.
            - **Safer provider re-enable** — re-enabling a provider with invalid credentials shows an auth error instead of crashing the app.
            - **Cross-window settings sync** — settings changes broadcast to the tray, widget, and settings windows so every view stays in sync.

            ### Install unstable
            - macOS: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-macos.sh | bash -s -- -i`
            - Linux: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-linux.sh | bash -s -- -i`
            - Windows: `$env:MOCHI_UNSTABLE = "1"; irm https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-windows.ps1 | iex`
          prerelease: true
          releaseDraft: false
          args: ${{ matrix.args }}
      - name: Upload unstable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mochi-unstable-${{ matrix.target }}
          path: src-tauri/target/**/release/bundle/**
      - name: Upload updater bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: updater-bundle-${{ matrix.platform }}-${{ matrix.target }}
          path: src-tauri/target/**/release/bundle/**
          if-no-files-found: error

  updater-feed:
    name: Validate Unstable Updater Feed
    needs: [metadata, build]
    runs-on: ubuntu-24.04
    env:
      MOCHI_UNSTABLE_BASE_VERSION: ${{ needs.metadata.outputs.base_version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Download updater bundle artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: updater-bundle-*
          path: updater-bundles
          merge-multiple: true
      - name: Build updater artifact manifest
        shell: bash
        env:
          CHANNEL: unstable
          CHANNELS: unstable
          UPDATER_FEED_BASE_URL: https://mochi-app.github.io/mochi/updates
          TAG_NAME: ${{ needs.metadata.outputs.tag }}
          RELEASE_BASE_URL: https://github.com/BrainerVirus/mochi/releases/download/${{ needs.metadata.outputs.tag }}
        run: |
          cat > release-notes.md <<'EOF'
          ### What's changed
          - See the GitHub release notes for this version.
          EOF
          node scripts/release/collect-updater-artifacts.mjs \
            --artifactRoot=updater-bundles \
            --channel="${CHANNEL}" \
            --tagName="${TAG_NAME}" \
            --unstableBaseVersion="${MOCHI_UNSTABLE_BASE_VERSION}" \
            --releaseBaseUrl="${RELEASE_BASE_URL}" \
            --releaseNotesPath=release-notes.md \
            --outputPath=updater-feed.json \
            --pubDate="$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          node -e '
            const fs = require("fs");
            const manifest = JSON.parse(fs.readFileSync("updater-feed.json", "utf8"));
            manifest.channels = process.env.CHANNELS.split(",").map((value) => value.trim()).filter(Boolean);
            fs.writeFileSync("updater-feed.json", `${JSON.stringify(manifest, null, 2)}\n`);
          '
      - name: Build updater feeds
        run: node scripts/release/build-updater-feed.mjs --manifest=updater-feed.json --out=public
      - name: Validate updater feeds
        run: |
          node scripts/release/validate-updater-feed.mjs \
            public/updates/darwin/aarch64/0.1.7/unstable.json \
            public/updates/darwin/aarch64/0.2.0/unstable.json \
            public/updates/darwin/x86_64/0.1.7/unstable.json \
            public/updates/darwin/x86_64/0.2.0/unstable.json \
            public/updates/linux/x86_64/0.1.7/unstable.json \
            public/updates/linux/x86_64/0.2.0/unstable.json \
            public/updates/windows/x86_64/0.1.7/unstable.json \
            public/updates/windows/x86_64/0.2.0/unstable.json

  update-homebrew-cask:
    name: Update Unstable Homebrew Cask
    needs: [metadata, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Generate unstable Homebrew cask
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/release/generate-homebrew-casks.mjs --tag "${{ needs.metadata.outputs.tag }}" --cask mochi-unstable --out-dir Casks
      - name: Open Homebrew cask PR and merge after CI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/release/publish-homebrew-cask-pr.sh \
            Casks/mochi-unstable.rb \
            "chore(homebrew): update unstable cask for ${{ needs.metadata.outputs.tag }}" \
            "chore/homebrew-unstable-${{ needs.metadata.outputs.tag }}" \
            "chore(homebrew): update unstable cask for ${{ needs.metadata.outputs.tag }}"

  release-notes:
    name: Publish Unstable Release Notes
    needs: [metadata, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Update unstable release body
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = "${{ needs.metadata.outputs.tag }}";
            const body = [
              `## Mochi ${tag}`,
              "",
              "Latest `main` build with instant tray updates when you change providers in Settings, safer re-enable with invalid credentials, and reliable settings sync across all windows.",
              "",
              "### What's changed",
              "- **Instant tray updates** — disabling or enabling a provider in Settings updates the tray panel immediately without a manual refresh.",
              "- **Safer provider re-enable** — re-enabling a provider with invalid credentials shows an auth error instead of crashing the app.",
              "- **Cross-window settings sync** — settings changes broadcast to the tray, widget, and settings windows so every view stays in sync.",
              "",
              "### Install unstable",
              "- macOS: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-macos.sh | bash -s -- -i`",
              "- Linux: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-linux.sh | bash -s -- -i`",
              "- Windows: `$env:MOCHI_UNSTABLE = \"1\"; irm https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-windows.ps1 | iex`",
            ].join("\n");
            const release = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag,
            });
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.data.id,
              body,
            });
