name: Unstable Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build unstable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos
          - os: windows-2022
            target: windows
          - os: ubuntu-22.04
            target: linux
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf flatpak flatpak-builder
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Tauri app
        run: pnpm tauri build
        env:
          MOCHI_UPDATE_CHANNEL: unstable
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload unstable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mochi-unstable-${{ matrix.target }}
          path: src-tauri/target/release/bundle/**
