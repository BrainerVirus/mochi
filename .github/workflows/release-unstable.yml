name: Unstable Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: unstable-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Unstable Release (${{ matrix.target }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            target: macos-arm64
            args: --target aarch64-apple-darwin
          - platform: macos-26-intel
            target: macos-x64
            args: --target x86_64-apple-darwin
          - platform: windows-2025-vs2026
            target: windows-x64
            args: ""
          - platform: ubuntu-24.04
            target: linux-x64
            args: ""
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v6
        continue-on-error: true
      - name: Checkout repository (retry)
        if: steps.checkout.outcome == 'failure'
        uses: actions/checkout@v6
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos-26') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Build unstable Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOCHI_UPDATE_CHANNEL: unstable
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: unstable
          releaseName: Mochi Unstable
          releaseBody: |
            ## Mochi Unstable

            Latest `main` build with Linux browser discovery and window stability fixes.

            ### What's changed
            - **Safer usage windows** — scheduled usage polling reads cached snapshots instead of starting live provider refreshes when settings, widget, or usage windows open.
            - **Linux Chromium discovery** — Chrome, Edge, Brave, Chromium, Vivaldi, Yandex, and Helium scan native, Flatpak, and Snap profile roots.
            - **Linux Gecko discovery** — Firefox and Zen scan native, Flatpak, and Snap profile roots, including Zen's current and historical Flatpak app IDs.
            - **GitHub Flow docs** — agent instructions now forbid tool prefixes such as `codex/` in branch names.

            ### Install unstable
            - macOS: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-macos.sh | bash -s -- -i`
            - Linux: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-linux.sh | bash -s -- -i`
            - Windows: `$env:MOCHI_UNSTABLE = "1"; irm https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-windows.ps1 | iex`
          prerelease: true
          releaseDraft: false
          args: ${{ matrix.args }}
      - name: Upload unstable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mochi-unstable-${{ matrix.target }}
          path: src-tauri/target/**/release/bundle/**

  release-notes:
    name: Publish Unstable Release Notes
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Update unstable release body
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const body = [
              "## Mochi Unstable",
              "",
              "Latest `main` build with Linux browser discovery and window stability fixes.",
              "",
              "### What's changed",
              "- **Safer usage windows** — scheduled usage polling reads cached snapshots instead of starting live provider refreshes when settings, widget, or usage windows open.",
              "- **Linux Chromium discovery** — Chrome, Edge, Brave, Chromium, Vivaldi, Yandex, and Helium scan native, Flatpak, and Snap profile roots.",
              "- **Linux Gecko discovery** — Firefox and Zen scan native, Flatpak, and Snap profile roots, including Zen's current and historical Flatpak app IDs.",
              "- **GitHub Flow docs** — agent instructions now forbid tool prefixes such as `codex/` in branch names.",
              "",
              "### Install unstable",
              "- macOS: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-macos.sh | bash -s -- -i`",
              "- Linux: `curl -fsSL https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-linux.sh | bash -s -- -i`",
              "- Windows: `$env:MOCHI_UNSTABLE = \"1\"; irm https://raw.githubusercontent.com/BrainerVirus/mochi/main/scripts/install/install-windows.ps1 | iex`",
            ].join("\n");
            const release = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag: "unstable",
            });
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.data.id,
              body,
            });
