name: Bug report
description: Report something in Mochi that is broken or surprising.
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping make Mochi better. Keep the report short, but include enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest steps that show the problem.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Mochi version
      placeholder: 0.1.0
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add logs, screenshots, or recordings if they help explain the issue.
    validations:
      required: false
